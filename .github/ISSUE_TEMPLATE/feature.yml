name: Feature request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the solution look like?
      description: A user-facing description (e.g., "I'd like spec.foo to accept ..."). Skip if you don't have a strong preference.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: textarea
    id: context
    attributes:
      label: Any other context?
