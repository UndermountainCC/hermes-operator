name: E2E
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: kind + make test-e2e
    runs-on: ucc-org-runners
    # 30m go test timeout (set in Makefile) + image builds + cert-manager
    # install can push wall-clock past the previous 30m job cap.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.24.0

      - name: Cache hermes-agent image
        uses: actions/cache@v4
        with:
          path: /tmp/hermes-agent-image.tar
          key: hermes-agent-image-v2026.4.30
          restore-keys: |
            hermes-agent-image-

      - name: Load cached hermes-agent image (if present)
        run: |
          if [ -f /tmp/hermes-agent-image.tar ]; then
            docker load -i /tmp/hermes-agent-image.tar
          fi

      - name: Pre-pull hermes-agent image
        run: |
          docker pull docker.io/nousresearch/hermes-agent:v2026.4.30
          docker save docker.io/nousresearch/hermes-agent:v2026.4.30 -o /tmp/hermes-agent-image.tar

      - name: Run E2E suite
        env:
          # The suite creates its own kind cluster via make setup-test-e2e.
          # github.run_id is a numeric GitHub-controlled value (safe to interpolate).
          RUN_ID: ${{ github.run_id }}
        run: |
          KIND_CLUSTER="hermes-e2e-${RUN_ID}" make test-e2e

      - name: Collect operator logs on failure
        if: failure()
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          CTX="kind-hermes-e2e-${RUN_ID}"
          kubectl --context "$CTX" -n hermes-operator-system logs \
            deployment/hermes-operator-controller-manager --tail=200 || true
          kubectl --context "$CTX" get events --all-namespaces --sort-by=.lastTimestamp || true
