name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Must track the go.mod toolchain: the action downloads a prebuilt
          # golangci-lint, and a binary built with an older Go exits 3 ("can't
          # parse go.mod go directive") once go.mod declares a newer Go. Keep
          # this in lockstep with Makefile's GOLANGCI_LINT_VERSION.
          version: v2.12.2
          # Default is 5m; self-hosted runners hit it on cold cache. Bump
          # so the linter has room to finish a real run.
          args: --timeout=10m

  manifests-no-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Regenerate manifests + deepcopy
        run: |
          make manifests
          make generate
      - name: Fail if generated files drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'make manifests generate' locally and commit." >&2
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        k8s: ['1.33', '1.34', '1.35']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install envtest binaries
        run: |
          # Pinned to the controller-runtime release branch in go.mod (v0.21.x)
          # instead of @latest: @latest floats and now resolves to a setup-envtest
          # that requires go >= 1.26, which broke CI under setup-go's GOTOOLCHAIN=local.
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.21
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use ${{ matrix.k8s }}.x -p path)" >> $GITHUB_ENV
      - name: Run tests
        run: make test

  dco:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify DCO sign-off on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MISSING=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            # Skip merge commits (they are auto-generated by GitHub and cannot carry trailers)
            parent_count=$(git show -s --format=%P "$sha" | wc -w)
            if [ "$parent_count" -gt 1 ]; then
              continue
            fi
            if ! git show -s --format=%B "$sha" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::Commit $sha missing Signed-off-by trailer (run 'git commit -s')."
              MISSING=1
            fi
          done
          exit $MISSING
