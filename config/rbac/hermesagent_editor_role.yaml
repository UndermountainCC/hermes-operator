# This rule is not used by the project hermes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the hermes.k8s.undermountain.cc.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hermes-operator
    app.kubernetes.io/managed-by: kustomize
  name: hermesagent-editor-role
rules:
- apiGroups:
  - hermes.k8s.undermountain.cc
  resources:
  - hermesagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - hermes.k8s.undermountain.cc
  resources:
  - hermesagents/status
  verbs:
  - get
