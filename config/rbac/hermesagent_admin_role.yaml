# This rule is not used by the project hermes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over hermes.k8s.undermountain.cc.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hermes-operator
    app.kubernetes.io/managed-by: kustomize
  name: hermesagent-admin-role
rules:
- apiGroups:
  - hermes.k8s.undermountain.cc
  resources:
  - hermesagents
  verbs:
  - '*'
- apiGroups:
  - hermes.k8s.undermountain.cc
  resources:
  - hermesagents/status
  verbs:
  - get
