apiVersion: v1
kind: Pod
metadata:
  name: hermes-ws-no-limits
  namespace: hermes-vap-e2e
  labels:
    app.kubernetes.io/managed-by: hermes-agent
spec:
  serviceAccountName: hermes-vap-session
  automountServiceAccountToken: false
  hostNetwork: false
  hostPID: false
  hostIPC: false
  restartPolicy: Never
  containers:
    - name: workspace
      image: docker.io/library/ubuntu:22.04
      command: ["sleep", "infinity"]
      # No resources.limits: VAP requires cpu + memory limits to bound the
      # blast radius of a compromised agent that could otherwise DoS the node.
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
